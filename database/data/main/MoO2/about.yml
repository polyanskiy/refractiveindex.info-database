NAMES:
  - Molybdenum dioxide
  - MoO<sub>2</sub>
  - Molybdenum(IV) oxide

ABOUT: |
    Molybdenum dioxide (MoO<sub>2</sub>) is a compound of molybdenum and oxygen. It typically appears as a dark, metallic-looking crystalline solid. Unlike molybdenum trioxide, MoO<sub>2</sub> exhibits metallic or highly conductive behavior due to its partially filled d-electron band structure. It is commonly used as an intermediate in the production of molybdenum metal and other molybdenum compounds.
    In optics and materials science, MoO<sub>2</sub> attracts interest because of its high electrical conductivity and stability at elevated temperatures. Thin films of MoO<sub>2</sub> can be deposited for applications in electrodes, plasmonic structures, and infrared optics. Its optical properties, particularly in the infrared range, are influenced by its metallic character, making it relevant for studies involving absorptive coatings and conductive layers.

