REFERENCES: |
    G. Jansonas, R. Budriūnas, M. Vengris, A. Varanavičius.
    Interferometric measurements of nonlinear refractive index in the infrared spectral range.
    [*Opt. Express* **30**, 30507–30524 (2022)](https://doi.org/10.1364/OE.458850)
COMMENTS: |
    Single crystal KTiOAsO<sub>4</sub> (KTA). Polar angle (θ): 45°, azimuthal angle (φ): 0°. Electric field was parallel to the Y dielectric axis. 230 fs, 170 fs and 190 fs at 1.03 μm, 2.2 μm and 3.2 μm, respectively. Estimated Kerr values were 1.9e-19, 2.2e-19 and 2.3e-19 at 1.03 μm, 2.2 μm and 3.2 μm, respectively. Fourier Interferometry.
CONDITIONS:
    n2_method: FI
    pulse_duration: 230e-15 170e-15 190e-15
DATA:
  - type: tabulated n2
    data: |
        1.03 1.85e-19
        2.2 2.2e-19
        3.2 2.2e-19
